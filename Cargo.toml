[package]
name = "zacxiom"
version = "1.0.0"
edition = "2021"
description = "Filesystem Intelligence Engine for Linux — Observe → Understand → Decide → Act"
license = "MIT"
repository = "https://github.com/oxyzenQ/zacxiom"

[[bin]]
name = "zacxiom"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
walkdir = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
libc = "0.2"

[dev-dependencies]
tempfile = "3"
