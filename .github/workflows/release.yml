---
name: Release

"on":
  push:
    tags:
      - 'v[0-9]+.*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            archive_suffix: linux-amd64-gnu
            install_musl: false
          - target: x86_64-unknown-linux-musl
            archive_suffix: linux-amd64-musl
            install_musl: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (musl build only)
        if: ${{ matrix.install_musl }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ matrix.target }}-

      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Verify static linking (musl only)
        if: ${{ matrix.install_musl }}
        run: |
          file target/${{ matrix.target }}/release/zacxiom
          ldd target/${{ matrix.target }}/release/zacxiom \
            || echo "Static binary (no dynamic deps)"

      - name: Package
        run: |
          ARCHIVE="zacxiom-${{ matrix.archive_suffix }}.tar.gz"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/zacxiom" dist/
          cp README.md LICENSE TRADEMARK.md dist/
          tar czf "$ARCHIVE" -C dist .
          sha512sum "$ARCHIVE" > "$ARCHIVE.sha512sum"
          echo "archive=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.archive }}
            ${{ env.archive }}.sha512sum
          generate_release_notes: true
