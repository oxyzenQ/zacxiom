---
name: Release

"on":
  push:
    tags:
      - 'v[0-9]+.*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            archive_suffix: linux-amd64-gnu
            install_musl: false
          - target: x86_64-unknown-linux-musl
            archive_suffix: linux-amd64-musl
            install_musl: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (musl build only)
        if: ${{ matrix.install_musl }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ matrix.target }}-

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify static linking (musl only)
        if: ${{ matrix.install_musl }}
        run: |
          file target/${{ matrix.target }}/release/zacxiom
          ldd target/${{ matrix.target }}/release/zacxiom \
            || echo "Static binary (no dynamic deps)"

      - name: Package
        run: |
          ARCHIVE="zacxiom-${{ matrix.archive_suffix }}.tar.gz"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/zacxiom" dist/
          cp README.md LICENSE TRADEMARK.md dist/
          tar czf "$ARCHIVE" -C dist .

          # Checksums: SHA-512 (classical) + BLAKE2b-512 + SHAKE256 (quantum-resistant)
          sha512sum "$ARCHIVE" > "$ARCHIVE.sha512sum"
          b2sum "$ARCHIVE" > "$ARCHIVE.b2sum"
          # SHAKE256 via Python (cross-platform — macOS/Windows ship LibreSSL
          # which doesn't support -shake256; openssl default output length also
          # varies by version. Python hashlib.shake_256 is consistent: 64 bytes
          # = 512 bits = 128 hex chars).
          python3 -c "import hashlib; h=hashlib.shake_256(open('$ARCHIVE','rb').read()).hexdigest(64); print(f'{h}  $ARCHIVE')" > "$ARCHIVE.shake256"
          echo "archive=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Generate release body
        if: matrix.archive_suffix == 'linux-amd64-gnu'
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${GITHUB_REF_NAME}$" | head -1 || true)
          {
            if [ -n "$PREV_TAG" ]; then
              echo "## What's Changed"
              echo ""
              git log --no-merges --pretty=format:'- %s (%h)' "${PREV_TAG}..${GITHUB_REF_NAME}"
              echo ""
            else
              echo "Initial release."
            fi
          } > release-body.md
          echo "=== Release body ==="
          cat release-body.md

      - name: Upload release
        uses: softprops/action-gh-release@v2
        if: matrix.archive_suffix == 'linux-amd64-gnu'
        with:
          body_path: release-body.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            ${{ env.archive }}
            ${{ env.archive }}.sha512sum
            ${{ env.archive }}.b2sum
            ${{ env.archive }}.shake256

      - name: Upload release (musl)
        uses: softprops/action-gh-release@v2
        if: matrix.archive_suffix == 'linux-amd64-musl'
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            ${{ env.archive }}
            ${{ env.archive }}.sha512sum
            ${{ env.archive }}.b2sum
            ${{ env.archive }}.shake256
