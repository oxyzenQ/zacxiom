---
name: CI

"on":
  push:
    branches: [main]
    paths:
      - '**.rs'
      - '**.toml'
      - '**/Cargo.lock'
      - '.github/workflows/*.yml'
      - '.yamllint'
      - '.codespellrc'
  pull_request:
    branches: [main]
    paths:
      - '**.rs'
      - '**.toml'
      - '**/Cargo.lock'
      - '.github/workflows/*.yml'
      - '.yamllint'
      - '.codespellrc'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test -- --test-threads=1

  musl-build:
    name: Static musl binary (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: musl-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: musl-cargo-

      - name: Build static musl binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Verify static linking
        run: |
          file target/x86_64-unknown-linux-musl/release/zacxiom
          ldd target/x86_64-unknown-linux-musl/release/zacxiom \
            || echo "Static binary (no dynamic deps)"

      - name: Smoke test musl binary
        run: |
          ./target/x86_64-unknown-linux-musl/release/zacxiom --version
          ./target/x86_64-unknown-linux-musl/release/zacxiom --help | head -5

  workflow_quality:
    name: Workflow lint + codespell
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install workflow lint tools
        run: |
          python3 -m pip install --user yamllint codespell
          go install github.com/rhysd/actionlint/cmd/actionlint@latest
          echo "${HOME}/go/bin" >> "${GITHUB_PATH}"

      - name: Run actionlint
        run: actionlint .github/workflows/*.yml

      - name: Run yamllint
        run: yamllint .github/workflows

      - name: Run codespell
        run: |
          if [ -f .codespellrc ]; then
            codespell --config .codespellrc .
          else
            codespell --skip './.git,./target,./assets,./dist,./node_modules' .
          fi
